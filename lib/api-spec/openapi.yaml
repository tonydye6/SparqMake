openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: SparqMake API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: brands
    description: Brand configuration
  - name: templates
    description: Creative templates
  - name: assets
    description: Asset library
  - name: hashtags
    description: Hashtag sets
  - name: creatives
    description: Creative management
  - name: upload
    description: File upload
  - name: social-accounts
    description: Social media account management
  - name: costs
    description: Cost tracking and analytics
  - name: calendar
    description: Calendar entries and scheduling
  - name: content-plan
    description: Social content planning
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /brands:
    get:
      operationId: getBrands
      tags: [brands]
      summary: Get all brands
      responses:
        "200":
          description: List of brands
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Brand"
    post:
      operationId: createBrand
      tags: [brands]
      summary: Create a brand
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBrandInput"
      responses:
        "201":
          description: Brand created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Brand"

  /brands/{id}:
    get:
      operationId: getBrand
      tags: [brands]
      summary: Get a brand by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Brand
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Brand"
    put:
      operationId: updateBrand
      tags: [brands]
      summary: Update a brand
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBrandInput"
      responses:
        "200":
          description: Brand updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Brand"
    delete:
      operationId: deleteBrand
      tags: [brands]
      summary: Delete a brand
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /templates:
    get:
      operationId: getTemplates
      tags: [templates]
      summary: Get all templates
      parameters:
        - name: brandId
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of templates
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TemplateListResponse"
    post:
      operationId: createTemplate
      tags: [templates]
      summary: Create a template
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTemplateInput"
      responses:
        "201":
          description: Template created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Template"

  /templates/{id}:
    get:
      operationId: getTemplate
      tags: [templates]
      summary: Get a template
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Template
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Template"
    put:
      operationId: updateTemplate
      tags: [templates]
      summary: Update a template
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTemplateInput"
      responses:
        "200":
          description: Template updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Template"
    delete:
      operationId: deleteTemplate
      tags: [templates]
      summary: Delete a template
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /assets:
    get:
      operationId: getAssets
      tags: [assets]
      summary: Get all assets
      parameters:
        - name: brandId
          in: query
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
        - name: offset
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of assets
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssetListResponse"
    post:
      operationId: createAsset
      tags: [assets]
      summary: Create an asset record
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAssetInput"
      responses:
        "201":
          description: Asset created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Asset"

  /assets/{id}:
    get:
      operationId: getAsset
      tags: [assets]
      summary: Get an asset
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Asset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Asset"
    put:
      operationId: updateAsset
      tags: [assets]
      summary: Update an asset
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAssetInput"
      responses:
        "200":
          description: Asset updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Asset"
    delete:
      operationId: deleteAsset
      tags: [assets]
      summary: Delete an asset
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /hashtag-sets:
    get:
      operationId: getHashtagSets
      tags: [hashtags]
      summary: Get all hashtag sets
      parameters:
        - name: brandId
          in: query
          schema:
            type: string
        - name: category
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of hashtag sets
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HashtagSetListResponse"
    post:
      operationId: createHashtagSet
      tags: [hashtags]
      summary: Create a hashtag set
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateHashtagSetInput"
      responses:
        "201":
          description: Hashtag set created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HashtagSet"

  /hashtag-sets/{id}:
    put:
      operationId: updateHashtagSet
      tags: [hashtags]
      summary: Update a hashtag set
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateHashtagSetInput"
      responses:
        "200":
          description: Hashtag set updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HashtagSet"
    delete:
      operationId: deleteHashtagSet
      tags: [hashtags]
      summary: Delete a hashtag set
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /creatives:
    get:
      operationId: getCreatives
      tags: [creatives]
      summary: Get all creatives
      parameters:
        - name: brandId
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of creatives
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreativeListResponse"
    post:
      operationId: createCreative
      tags: [creatives]
      summary: Create a creative
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCreativeInput"
      responses:
        "201":
          description: Creative created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Creative"

  /creatives/{id}:
    get:
      operationId: getCreative
      tags: [creatives]
      summary: Get a creative
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Creative
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Creative"
    put:
      operationId: updateCreative
      tags: [creatives]
      summary: Update a creative
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCreativeInput"
      responses:
        "200":
          description: Creative updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Creative"

  /upload:
    post:
      operationId: uploadFile
      tags: [upload]
      summary: Upload a file
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                brandId:
                  type: string
                type:
                  type: string
              required:
                - file
      responses:
        "200":
          description: File uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadResponse"

  /social-accounts:
    get:
      operationId: getSocialAccounts
      tags: [social-accounts]
      summary: List all connected social accounts
      responses:
        "200":
          description: List of social accounts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SocialAccount"

  /social-accounts/{id}:
    delete:
      operationId: deleteSocialAccount
      tags: [social-accounts]
      summary: Disconnect a social account
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Account disconnected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SocialAccountDeleteResponse"
        "404":
          description: Account not found

  /social-accounts/{id}/refresh:
    post:
      operationId: refreshSocialAccount
      tags: [social-accounts]
      summary: Refresh an expired or expiring token
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Token refreshed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SocialAccountRefreshResponse"
        "400":
          description: Refresh failed
        "404":
          description: Account not found

  /templates/{id}/versions:
    get:
      operationId: getTemplateVersions
      tags: [templates]
      summary: Get version history for a template
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of template versions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TemplateVersion"

  /templates/{id}/rollback/{versionId}:
    post:
      operationId: rollbackTemplate
      tags: [templates]
      summary: Rollback a template to a previous version
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: versionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Template rolled back
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Template"

  /templates/{id}/stats:
    get:
      operationId: getTemplateStats
      tags: [templates]
      summary: Get performance statistics for a template
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Template statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TemplateStats"

  /templates/{id}/analyze:
    post:
      operationId: analyzeTemplate
      tags: [templates]
      summary: Trigger Claude-powered refinement analysis for a template
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Analysis result with recommendations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TemplateRecommendation"

  /templates/{id}/recommendations:
    get:
      operationId: getTemplateRecommendations
      tags: [templates]
      summary: List recommendations for a template
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of recommendations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TemplateRecommendation"

  /templates/{id}/recommendations/{recId}:
    put:
      operationId: updateTemplateRecommendation
      tags: [templates]
      summary: Apply or dismiss a recommendation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: recId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecommendationActionInput"
      responses:
        "200":
          description: Recommendation updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TemplateRecommendation"

  /creatives/{id}/generate-video:
    post:
      operationId: generateVideo
      tags: [creatives]
      summary: Generate video variants for a creative (SSE)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                orientations:
                  type: array
                  items:
                    type: string
                    enum: [landscape, portrait]
      responses:
        "200":
          description: SSE stream of video generation progress

  /creatives/{id}/variants/{variantId}/audio:
    post:
      operationId: addVariantAudio
      tags: [creatives]
      summary: Generate and merge AI audio onto a video variant
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: variantId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AudioGenerateInput"
      responses:
        "200":
          description: Variant updated with merged audio
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreativeVariant"

  /creatives/{id}/variants/{variantId}/audio-upload:
    post:
      operationId: uploadVariantAudio
      tags: [creatives]
      summary: Upload custom audio and merge onto a video variant
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: variantId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                audio:
                  type: string
                  format: binary
                mode:
                  type: string
                  enum: [replace, mix]
              required:
                - audio
      responses:
        "200":
          description: Variant updated with custom audio
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreativeVariant"

  /calendar-entries:
    get:
      operationId: getCalendarEntries
      tags: [calendar]
      summary: Get calendar entries within a date range
      parameters:
        - name: start
          in: query
          schema:
            type: string
            format: date-time
        - name: end
          in: query
          schema:
            type: string
            format: date-time
        - name: brandId
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
        - name: offset
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of calendar entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalendarEntryListResponse"
    post:
      operationId: createCalendarEntry
      tags: [calendar]
      summary: Schedule a creative variant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCalendarEntryInput"
      responses:
        "201":
          description: Calendar entry created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalendarEntryRow"

  /calendar-entries/batch:
    post:
      operationId: batchScheduleCalendarEntries
      tags: [calendar]
      summary: Batch schedule multiple approved creatives
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BatchScheduleInput"
      responses:
        "201":
          description: Calendar entries created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchScheduleResponse"

  /calendar-entries/{id}:
    put:
      operationId: updateCalendarEntry
      tags: [calendar]
      summary: Update a calendar entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCalendarEntryInput"
      responses:
        "200":
          description: Calendar entry updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalendarEntryRow"
    delete:
      operationId: deleteCalendarEntry
      tags: [calendar]
      summary: Delete a calendar entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /calendar-entries/{id}/publish:
    post:
      operationId: publishCalendarEntry
      tags: [calendar]
      summary: Publish a calendar entry immediately
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Publishing initiated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalendarEntryActionResponse"

  /calendar-entries/{id}/retry:
    post:
      operationId: retryCalendarEntry
      tags: [calendar]
      summary: Retry a failed calendar entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Retry initiated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalendarEntryActionResponse"

  /content-plan:
    get:
      operationId: getContentPlan
      tags: [content-plan]
      summary: Get content plan items
      parameters:
        - name: pillar
          in: query
          schema:
            type: string
        - name: platform
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
        - name: plannedWeek
          in: query
          schema:
            type: string
        - name: brandLayer
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
        - name: offset
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of content plan items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentPlanListResponse"
    post:
      operationId: createPlanItem
      tags: [content-plan]
      summary: Create a content plan item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePlanItemInput"
      responses:
        "201":
          description: Plan item created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlanItem"

  /content-plan/import:
    post:
      operationId: importContentPlan
      tags: [content-plan]
      summary: Import content plan items from a CSV file
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
              required:
                - file
      responses:
        "200":
          description: Import result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentPlanImportResponse"

  /content-plan/{id}:
    get:
      operationId: getPlanItem
      tags: [content-plan]
      summary: Get a content plan item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Plan item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlanItem"
    put:
      operationId: updatePlanItem
      tags: [content-plan]
      summary: Update a content plan item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePlanItemInput"
      responses:
        "200":
          description: Plan item updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlanItem"
    delete:
      operationId: deletePlanItem
      tags: [content-plan]
      summary: Delete a content plan item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlanItemDeleteResponse"

  /content-plan/{id}/create-creative:
    post:
      operationId: createCreativeFromPlanItem
      tags: [content-plan]
      summary: Create a creative from a content plan item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "201":
          description: Creative created from plan item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateCreativeFromPlanItemResponse"

  /cost-logs:
    get:
      operationId: getCostLogs
      tags: [costs]
      summary: Get cost log entries with optional filters
      parameters:
        - name: startDate
          in: query
          schema:
            type: string
            format: date-time
        - name: endDate
          in: query
          schema:
            type: string
            format: date-time
        - name: service
          in: query
          schema:
            type: string
        - name: operation
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of cost log entries
          content:
            application/json:
              schema:
                type: array
                items:
